<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — TomatoGuard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a1a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            max-width: 420px;
            width: 100%;
            background: rgba(10,30,10,0.85);
            border: 1px solid rgba(76,175,80,0.06);
            border-radius: 16px;
            padding: 40px 32px;
            backdrop-filter: blur(10px);
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header .logo {
            font-size: 2.5rem;
            margin-bottom: 8px;
        }

        .login-header h1 {
            font-size: 1.5rem;
            color: #4caf50;
            font-weight: 700;
        }

        .login-header p {
            color: #a5d6a7;
            font-size: 0.85rem;
            margin-top: 4px;
        }

        .admin-badge {
            display: inline-block;
            background: #ffca28;
            color: #1a2e1a;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            color: #a5d6a7;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(76,175,80,0.12);
            border-radius: 8px;
            color: #e8f5e9;
            font-size: 1rem;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: #4caf50;
        }

        .form-group input::placeholder {
            color: rgba(255,255,255,0.2);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2e7d32, #4caf50);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(76,175,80,0.2);
        }

        .error-message {
            background: rgba(211,47,47,0.1);
            border: 1px solid #d32f2f;
            color: #ef9a9a;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: none;
            font-size: 0.9rem;
        }

        .error-message.show {
            display: block;
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.04);
        }

        .login-footer a {
            color: #a5d6a7;
            text-decoration: none;
            font-size: 0.85rem;
        }

        .login-footer a:hover {
            color: #4caf50;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 24px 20px;
            }
            .login-header h1 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-header">
            <div class="logo">🍅</div>
            <h1>Admin Login</h1>
            <p>TomatoGuard Support & Administration</p>
            <span class="admin-badge">🔒 Secure Access</span>
        </div>

        <div class="error-message" id="errorMessage">{{ error }}</div>

        <form method="POST" action="/admin/login">
            <div class="form-group">
                <label>👤 Username</label>
                <input type="text" name="username" placeholder="Enter admin username" required autofocus>
            </div>

            <div class="form-group">
                <label>🔑 Password</label>
                <input type="password" name="password" placeholder="Enter admin password" required>
            </div>

            <button type="submit" class="btn-login">🔓 Login to Admin Panel</button>
        </form>

        <div class="login-footer">
            <a href="/login">← Back to Farmer Login</a>
        </div>
    </div>

    <script>
        const errorMsg = document.getElementById('errorMessage');
        if (errorMsg.textContent.trim()) {
            errorMsg.classList.add('show');
        }
    </script>

</body>
</html>
